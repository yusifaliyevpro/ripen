name: PR Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install

      - name: Format check
        run: pnpm fmt:check

      - name: Lint check
        run: pnpm lint

      - name: Build
        run: pnpm build
