name: PR Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install

      - name: Prettier check
        run: pnpm prettier --check .

      - run: pnpm typecheck

      - run: pnpm build
