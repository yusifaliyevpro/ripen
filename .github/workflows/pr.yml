name: PR Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install

      - name: Prettier check
        run: pnpm prettier --check .

      - run: pnpm typecheck

      - run: pnpm build

      - name: Check changelog if version changed
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          git fetch origin ${{ github.base_ref }} --depth=1
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:package.json | jq -r .version)
          echo "PR version: $CURRENT_VERSION"
          echo "Base version: $BASE_VERSION"

          if [ "$CURRENT_VERSION" != "$BASE_VERSION" ]; then
            echo "Version changed ($BASE_VERSION → $CURRENT_VERSION), checking changelog..."
            if ! grep -q "version=\"$CURRENT_VERSION\"" docs/src/app/changelog/page.tsx; then
              echo "::error::Version bumped to $CURRENT_VERSION but no changelog entry found."
              echo "Please add a <ChangelogEntry version=\"$CURRENT_VERSION\" ...> to docs/src/app/changelog/page.tsx"
              exit 1
            fi
            echo "✓ Changelog entry found for v$CURRENT_VERSION"
          else
            echo "Version unchanged, skipping changelog check."
          fi
