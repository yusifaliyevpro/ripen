name: Publish NPM package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Check the version
        id: check
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "Current version: $CURRENT_VERSION"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          LATEST_VERSION=${LATEST_TAG#v}

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ];
          then
            echo "Version changed"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check changelog entry exists
        if: steps.check.outputs.version_changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          if ! grep -q "version=\"$VERSION\"" docs/src/app/changelog/page.tsx; then
            echo "::error::No changelog entry found for version $VERSION in docs/src/app/changelog/page.tsx"
            echo "Please add a <ChangelogEntry version=\"$VERSION\" ...> before publishing."
            exit 1
          fi
          echo "Changelog entry found for v$VERSION"

      - name: Extract release notes
        if: steps.check.outputs.version_changed == 'true'
        run: node scripts/extract-release-notes.cjs "${{ steps.check.outputs.new_version }}" /tmp/release-notes.md

      - name: Build
        if: steps.check.outputs.version_changed == 'true'
        run: pnpm build

      - name: Publish
        if: steps.check.outputs.version_changed == 'true'
        run: npm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ""

      - name: Tag release
        if: steps.check.outputs.version_changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "v${{ steps.check.outputs.new_version }}" -m "v${{ steps.check.outputs.new_version }}"
          git push origin "v${{ steps.check.outputs.new_version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.check.outputs.new_version }}" \
            --title "v${{ steps.check.outputs.new_version }}" \
            --notes-file /tmp/release-notes.md \
            --latest
